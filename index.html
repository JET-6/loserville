<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Loserville</title>

<style>
    /* ------------------------------
       GLOBAL STYLES + ANIMATED BG
    ------------------------------ */
    body {
        margin: 0;
        padding: 0;
        font-family: 'Arial', sans-serif;
        color: white;
        overflow: hidden;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        background: black;
    }

    /* Animated gradient background */
    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: linear-gradient(45deg, #ff00cc, #3333ff, #00eaff, #ff0099);
        background-size: 400% 400%;
        animation: gradientMove 12s ease infinite;
        z-index: -2;
    }

    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* Neon text */
    .neon {
        font-size: 2.8rem;
        color: #ff4df0;
        text-shadow:
            0 0 5px #ff4df0,
            0 0 10px #ff4df0,
            0 0 20px #ff4df0,
            0 0 40px #ff00ff;
        animation: flicker 2s infinite;
    }

    @keyframes flicker {
        0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
            opacity: 1;
        }
        20%, 24%, 55% {
            opacity: 0.4;
        }
    }

    /* Buttons */
    button {
        padding: 12px 25px;
        margin: 10px;
        font-size: 1.2rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #ffffff22;
        color: white;
        backdrop-filter: blur(4px);
        transition: 0.2s;
    }

    button:hover {
        background: #ffffff55;
    }

    /* Page container */
    .page {
        display: none;
        width: 90%;
        max-width: 600px;
    }

    /* Highway sign */
    .sign {
        background: #0a3d62;
        padding: 40px 20px;
        border-radius: 12px;
        border: 4px solid #1dd1a1;
        color: #1dd1a1;
        font-size: 1.8rem;
        text-shadow: 0 0 10px #1dd1a1;
        box-shadow: 0 0 20px #1dd1a1;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from { box-shadow: 0 0 10px #1dd1a1; }
        to { box-shadow: 0 0 25px #1dd1a1; }
    }

    /* Mobile responsiveness */
    @media (max-width: 600px) {
        .neon { font-size: 2rem; }
        button { font-size: 1rem; padding: 10px 20px; }
        .sign { font-size: 1.4rem; }
    }

    /* Neon Scream */
    @keyframes neonScream {
    0% {
        box-shadow:
            0 0 5px #ff00ff,
            0 0 15px #ff00ff,
            0 0 30px #ff00ff,
            0 0 60px #ff00ff;
        background: #ff00ff55;
    }
    50% {
        box-shadow:
            0 0 5px #00ffff,
            0 0 15px #00ffff,
            0 0 30px #00ffff,
            0 0 60px #00ffff;
        background: #00ffff55;
    }
    100% {
        box-shadow:
            0 0 5px #ff0099,
            0 0 15px #ff0099,
            0 0 30px #ff0099,
            0 0 60px #ff0099;
        background: #ff009955;
    }
}

@keyframes jitter {
    0% { transform: translate(0px, 0px) rotate(0deg); }
    25% { transform: translate(1px, -1px) rotate(-1deg); }
    50% { transform: translate(-1px, 1px) rotate(1deg); }
    75% { transform: translate(2px, -2px) rotate(0deg); }
    100% { transform: translate(-2px, 2px) rotate(1deg); }
}

    /* emo loading bar */
    #loadingBarContainer {
    width: 80%;
    height: 12px;
    background: #ffffff22;
    border-radius: 6px;
    margin: 20px auto 10px;
    overflow: hidden;
    backdrop-filter: blur(4px);
}

#loadingBar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #ff00ff, #00ffff, #ff0099);
    background-size: 300% 300%;
    animation: loadingGlow 1.5s infinite, loadingFill 2.2s forwards;
}

@keyframes loadingGlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

@keyframes loadingFill {
    0% { width: 0%; }
    100% { width: 100%; }
}

    /* ANIMATED HEADER */
    #openingHeader {
    animation: headerFlicker 3s infinite, headerDrift 6s ease-in-out infinite alternate;
}

@keyframes headerFlicker {
    0%, 100% { opacity: 1; }
    45% { opacity: 0.95; }
    48% { opacity: 0.6; }
    50% { opacity: 1; }
    52% { opacity: 0.7; }
    55% { opacity: 1; }
}

@keyframes headerDrift {
    0% { transform: translateY(0px); }
    100% { transform: translateY(6px); }
}

    /* laughing @ u on page 2 */
    .laughContainer {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 80px;
}

.smiley {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 6px solid #ff00ff;
    position: relative;
    animation: headShake 0.6s infinite ease-in-out alternate;
    box-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
}

.eye {
    width: 20px;
    height: 20px;
    background: #ff00ff;
    border-radius: 50%;
    position: absolute;
    top: 50px;
}

.eye.left { left: 45px; }
.eye.right { right: 45px; }

.mouth {
    width: 100px;
    height: 60px;
    border-bottom: 6px solid #ff00ff;
    border-radius: 0 0 60px 60px;
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    animation: laughMouth 0.4s infinite alternate;
}

@keyframes laughMouth {
    0% { height: 40px; }
    100% { height: 70px; }
}

@keyframes headShake {
    0% { transform: rotate(-6deg); }
    100% { transform: rotate(6deg); }
}

.laughText {
    margin-top: 30px;
    font-size: 2.2rem;
    color: #ff00ff;
    animation: laughFlicker 0.15s infinite alternate;
}

@keyframes laughFlicker {
    0% { opacity: 0.6; text-shadow: 0 0 10px #ff00ff; }
    100% { opacity: 1; text-shadow: 0 0 25px #ff00ff; }
}


</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="page">
    <h1 class="neon" id="openingHeader">well, well, well... fancy seeing you here...</h1>

    <div id="loadingBarContainer">
        <div id="loadingBar"></div>
    </div>

    <p id="questionText" style="font-size:1.4rem; margin-top:20px; display:none;">
        did you miss me?
    </p>

    <button id="yesBtn" style="display:none;" onclick="goTo('page2')">yes</button>
    <button id="noBtn" style="display:none;">no</button>
</div>

<!-- PAGE 2 -->
<div class="laughContainer">
    <div class="smiley">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="mouth"></div>
    </div>

    <h2 class="laughText">HAHAHAHAHAHA</h2>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
    <div class="sign">
        welcome to loserville<br>
        population: you
    </div>
    <button onclick="goTo('page1')">get me outta here!</button>
</div>

<script>
/* ------------------------------
   SIMPLE PAGE ROUTER
------------------------------ */
function goTo(page) {
    window.location.hash = page;
    showPage();
}

function showPage() {
    const hash = window.location.hash.replace("#", "") || "page1";
    document.querySelectorAll(".page").forEach(p => p.style.display = "none");
    document.getElementById(hash).style.display = "block";
}

window.addEventListener("load", showPage);
window.addEventListener("hashchange", showPage);

/* ------------------------------
   EMOTIONAL LOADING BAR LOGIC
------------------------------ */
window.addEventListener("load", () => {
    const question = document.getElementById("questionText");
    const loadingBar = document.getElementById("loadingBar");

    // Reveal the question after the bar finishes filling
    setTimeout(() => {
        loadingBar.style.animation = "loadingGlow 1.5s infinite"; // stop the fill animation
        question.style.display = "block";

        // Reveal buttons AFTER loading finishes
        document.getElementById("yesBtn").style.display = "inline-block";
        document.getElementById("noBtn").style.display = "inline-block";

    }, 2200); // matches loadingFill duration
});

/* ------------------------------
   SCREAMING NEON "NO" BUTTON
------------------------------ */
const noBtn = document.getElementById("noBtn");

// Add screaming neon styles
noBtn.style.position = "fixed";
noBtn.style.transition = "left 0.1s linear, top 0.1s linear";
noBtn.style.animation = "neonScream 0.2s infinite alternate, jitter 0.1s infinite";

function moveButton() {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 120);

    noBtn.style.left = `${x}px`;
    noBtn.style.top = `${y}px`;
}

noBtn.addEventListener("mouseenter", moveButton);
noBtn.addEventListener("mouseover", moveButton);

</script>

</body>
