<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Loserville</title>

<style>
    /* ------------------------------
       GLOBAL STYLES + ANIMATED BG
    ------------------------------ */
    body {
        margin: 0;
        padding: 0;
        font-family: 'Arial', sans-serif;
        color: white;
        overflow: hidden;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        background: black;
    }

    /* Animated gradient background */
    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: linear-gradient(45deg, #ff00cc, #3333ff, #00eaff, #ff0099);
        background-size: 400% 400%;
        animation: gradientMove 12s ease infinite;
        z-index: -2;
    }

    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* Neon text */
    .neon {
        font-size: 2.8rem;
        color: #ff4df0;
        text-shadow:
            0 0 5px #ff4df0,
            0 0 10px #ff4df0,
            0 0 20px #ff4df0,
            0 0 40px #ff00ff;
        animation: flicker 2s infinite;
    }

    @keyframes flicker {
        0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
            opacity: 1;
        }
        20%, 24%, 55% {
            opacity: 0.4;
        }
    }

    /* Buttons */
    button {
        padding: 12px 25px;
        margin: 10px;
        font-size: 1.2rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #ffffff22;
        color: white;
        backdrop-filter: blur(4px);
        transition: 0.2s;
    }

    button:hover {
        background: #ffffff55;
    }

    /* Page container */
    .page {
        display: none;
        width: 90%;
        max-width: 600px;
    }

    /* Highway sign */
    .sign {
        background: #0a3d62;
        padding: 40px 20px;
        border-radius: 12px;
        border: 4px solid #1dd1a1;
        color: #1dd1a1;
        font-size: 1.8rem;
        text-shadow: 0 0 10px #1dd1a1;
        box-shadow: 0 0 20px #1dd1a1;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from { box-shadow: 0 0 10px #1dd1a1; }
        to { box-shadow: 0 0 25px #1dd1a1; }
    }

    /* Mobile responsiveness */
    @media (max-width: 600px) {
        .neon { font-size: 2rem; }
        button { font-size: 1rem; padding: 10px 20px; }
        .sign { font-size: 1.4rem; }
    }

    /* Neon Scream */
    @keyframes neonScream {
    0% {
        box-shadow:
            0 0 5px #ff00ff,
            0 0 15px #ff00ff,
            0 0 30px #ff00ff,
            0 0 60px #ff00ff;
        background: #ff00ff55;
    }
    50% {
        box-shadow:
            0 0 5px #00ffff,
            0 0 15px #00ffff,
            0 0 30px #00ffff,
            0 0 60px #00ffff;
        background: #00ffff55;
    }
    100% {
        box-shadow:
            0 0 5px #ff0099,
            0 0 15px #ff0099,
            0 0 30px #ff0099,
            0 0 60px #ff0099;
        background: #ff009955;
    }
}

@keyframes jitter {
    0% { transform: translate(0px, 0px) rotate(0deg); }
    25% { transform: translate(1px, -1px) rotate(-1deg); }
    50% { transform: translate(-1px, 1px) rotate(1deg); }
    75% { transform: translate(2px, -2px) rotate(0deg); }
    100% { transform: translate(-2px, 2px) rotate(1deg); }
}

    /* emo loading bar */
    #loadingBarContainer {
    width: 80%;
    height: 12px;
    background: #ffffff22;
    border-radius: 6px;
    margin: 20px auto 10px;
    overflow: hidden;
    backdrop-filter: blur(4px);
}

#loadingBar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #ff00ff, #00ffff, #ff0099);
    background-size: 300% 300%;
    animation: loadingGlow 1.5s infinite, loadingFill 2.2s forwards;
}

@keyframes loadingGlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

@keyframes loadingFill {
    0% { width: 0%; }
    100% { width: 100%; }
}

    /* ANIMATED HEADER */
    #openingHeader {
    animation: headerFlicker 3s infinite, headerDrift 6s ease-in-out infinite alternate;
}

@keyframes headerFlicker {
    0%, 100% { opacity: 1; }
    45% { opacity: 0.95; }
    48% { opacity: 0.6; }
    50% { opacity: 1; }
    52% { opacity: 0.7; }
    55% { opacity: 1; }
}

@keyframes headerDrift {
    0% { transform: translateY(0px); }
    100% { transform: translateY(6px); }
}

    /* laughing @ u on page 2 */
    .laughContainer {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 80px;
}

.smiley {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 6px solid #ff00ff;
    position: relative;
    animation: headShake 0.6s infinite ease-in-out alternate;
    box-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
}

.eye {
    width: 20px;
    height: 20px;
    background: #ff00ff;
    border-radius: 50%;
    position: absolute;
    top: 50px;
}

.eye.left { left: 45px; }
.eye.right { right: 45px; }

.mouth {
    width: 100px;
    height: 60px;
    border-bottom: 6px solid #ff00ff;
    border-radius: 0 0 60px 60px;
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    animation: laughMouth 0.4s infinite alternate;
}

@keyframes laughMouth {
    0% { height: 40px; }
    100% { height: 70px; }
}

@keyframes headShake {
    0% { transform: rotate(-6deg); }
    100% { transform: rotate(6deg); }
}

.laughText {
    margin-top: 30px;
    font-size: 2.2rem;
    color: #ff00ff;
    animation: laughFlicker 0.15s infinite alternate;
}

@keyframes laughFlicker {
    0% { opacity: 0.6; text-shadow: 0 0 10px #ff00ff; }
    100% { opacity: 1; text-shadow: 0 0 25px #ff00ff; }
}

/* ------------------------------
   PAGE 2 — Synthwave Carnival
------------------------------ */

#page2 .synthwave-bg {
    width: 100%;
    height: 100%;
    padding-top: 80px;
    background: linear-gradient(135deg, #0a0020, #1a0040, #ff00cc, #00eaff);
    background-size: 300% 300%;
    animation: bgShift 12s ease-in-out infinite;
}

@keyframes bgShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

#page2 .laughContainer {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Smiley */
#page2 .synthwaveSmiley {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 6px solid #ff00cc;
    position: relative;
    animation: smileyPulse 3s infinite ease-in-out, smileyTilt 4s infinite alternate;
    box-shadow: 0 0 20px #ff00cc, 0 0 40px #ff00cc;
    background: radial-gradient(circle, #ff00cc33, #00000000);
}

@keyframes smileyPulse {
    0% { box-shadow: 0 0 20px #ff00cc; }
    50% { box-shadow: 0 0 40px #00eaff; }
    100% { box-shadow: 0 0 20px #ff00cc; }
}

@keyframes smileyTilt {
    0% { transform: rotate(-4deg); }
    100% { transform: rotate(4deg); }
}

#page2 .eye {
    width: 20px;
    height: 20px;
    background: #00eaff;
    border-radius: 50%;
    position: absolute;
    top: 50px;
    box-shadow: 0 0 10px #00eaff;
}

#page2 .eye.left { left: 45px; }
#page2 .eye.right { right: 45px; }

#page2 .mouth {
    width: 100px;
    height: 60px;
    border-bottom: 6px solid #ff00cc;
    border-radius: 0 0 60px 60px;
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    animation: mouthLaugh 0.5s infinite alternate;
    box-shadow: 0 0 15px #ff00cc;
}

@keyframes mouthLaugh {
    0% { height: 40px; }
    100% { height: 75px; }
}

/* Marquee */
#page2 .marquee {
    margin-top: 30px;
    padding: 10px 20px;
    border: 4px solid #00eaff;
    border-radius: 10px;
    box-shadow: 0 0 20px #00eaff, inset 0 0 20px #00eaff;
    animation: marqueePulse 1.5s infinite alternate;
}

#page2 .marquee span {
    font-size: 2rem;
    color: #00eaff;
    text-shadow: 0 0 15px #00eaff;
    animation: marqueeFlicker 0.2s infinite alternate;
}

@keyframes marqueePulse {
    0% { box-shadow: 0 0 20px #00eaff; }
    100% { box-shadow: 0 0 40px #ff00cc; }
}

@keyframes marqueeFlicker {
    0% { opacity: 0.7; }
    100% { opacity: 1; }
}

/* Continue Button */
#page2 .synthwaveBtn {
    margin-top: 40px;
    padding: 12px 30px;
    font-size: 1.2rem;
    color: white;
    background: linear-gradient(90deg, #ff00cc, #00eaff);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 0 20px #ff00cc;
    animation: btnPulse 2s infinite alternate;
}

@keyframes btnPulse {
    0% { box-shadow: 0 0 15px #ff00cc; }
    100% { box-shadow: 0 0 25px #00eaff; }
}

/* ------------------------------
   PAGE 3 — Wasteland Carnival
------------------------------ */

#page3 .wasteland-bg {
    width: 100%;
    height: 100%;
    padding-top: 80px;
    background: linear-gradient(180deg,
        #ff0000 0%,
        #ff6600 25%,
        #ffcc00 50%,
        #331100 75%,
        #000000 100%
    );
    background-size: 100% 100%;
    position: relative;
    overflow: hidden;
}

/* subtle heat shimmer */
#page3 .wasteland-bg::before {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.1) 0px,
        rgba(0,0,0,0.1) 1px,
        transparent 2px,
        transparent 4px
    );
    mix-blend-mode: soft-light;
    opacity: 0.4;
    animation: heatWave 4s infinite ease-in-out;
    pointer-events: none;
}

@keyframes heatWave {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0px); }
}

/* sign container */
#page3 .loservilleSign {
    display: flex;
    justify-content: center;
    margin-top: 40px;
}

#page3 .signFrame {
    padding: 20px 30px;
    border: 5px solid #ffdd55;
    border-radius: 14px;
    box-shadow:
        0 0 20px #ffdd55,
        0 0 40px #ff6600,
        inset 0 0 15px #ffdd55;
    background: rgba(0, 0, 0, 0.6);
    position: relative;
    animation: signShake 0.4s infinite alternate;
}

/* fake bulbs around frame */
#page3 .signFrame::before {
    content: "";
    position: absolute;
    inset: -10px;
    border-radius: 18px;
    border: 2px dotted rgba(255, 255, 255, 0.4);
    box-shadow: 0 0 10px #ffdd55;
    opacity: 0.7;
}

/* main text */
#page3 .loservilleMain {
    font-size: 2.2rem;
    color: #ffdd55;
    text-align: center;
    text-shadow:
        0 0 10px #ffdd55,
        0 0 25px #ff6600;
    letter-spacing: 2px;
    animation: mainFlicker 0.18s infinite alternate;
}

/* sub text */
#page3 .loservilleSub {
    margin-top: 10px;
    font-size: 1.4rem;
    color: #ffffffcc;
    text-align: center;
    text-shadow: 0 0 8px #ffffff88;
}

#page3 .loservilleSub span {
    color: #ff5555;
    text-shadow:
        0 0 10px #ff5555,
        0 0 25px #ff0000;
    animation: youPulse 1.2s infinite alternate;
}

/* animations */
@keyframes signShake {
    0% { transform: translate(-2px, 1px) rotate(-1deg); }
    100% { transform: translate(2px, -1px) rotate(1deg); }
}

@keyframes mainFlicker {
    0% { opacity: 0.9; }
    40% { opacity: 1; }
    45% { opacity: 0.3; }
    50% { opacity: 1; }
    55% { opacity: 0.5; }
    60% { opacity: 1; }
    100% { opacity: 0.95; }
}

@keyframes youPulse {
    0% { transform: scale(1); }
    100% { transform: scale(1.15); }
}

/* final button */
#page3 .fateBtn {
    display: block;
    margin: 40px auto 0;
    padding: 12px 30px;
    font-size: 1.1rem;
    color: #fff;
    background: linear-gradient(90deg, #ff0000, #ff6600);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 0 20px #ff3300;
    animation: fatePulse 1.5s infinite alternate;
}

@keyframes fatePulse {
    0% { box-shadow: 0 0 15px #ff3300; }
    100% { box-shadow: 0 0 30px #ffcc00; }
}

body.noGlobalBG::before {
    display: none;
}


</style>
</head>

<body>

<div id="page1" class="page">
    <h1 class="neon" id="openingHeader">well, well, well... fancy seeing you here...</h1>

    <div id="loadingBarContainer">
        <div id="loadingBar"></div>
    </div>

    <p id="questionText" style="font-size:1.4rem; margin-top:20px; display:none;">

    </p>

    <button id="yesBtn" style="display:none;" onclick="goTo(2)">yes</button>
    <button id="noBtn" style="display:none;">no</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page" style="display:none;">
    <div class="synthwave-bg">

        <div class="laughContainer">
            <div class="smiley synthwaveSmiley">
                <div class="eye left"></div>
                <div class="eye right"></div>
                <div class="mouth"></div>
            </div>

            <div class="marquee">
                <span>HAHAHAHAHAHA</span>
            </div>
        </div>

    <button onclick="goTo(3)" id="continueBtn" class="synthwaveBtn">
        obviously
    </button>

</div>

</div>
<!-- PAGE 3 -->
<div id="page3" class="page">
    <div class="wasteland-bg">

        <div class="loservilleSign">
            <div class="signFrame">
                <h1 class="loservilleMain">WELCOME TO LOSERVILLE</h1>
                <h2 class="loservilleSub">population: <span>you</span></h2>
            </div>
        </div>

        <button class="fateBtn" onclick="goTo(1)">
            accept your fate
        </button>

    </div>
</div>

<script>

    /* UPDATED PAGE ROUTER */
function goTo(page) {
    // Normalize page into an ID like "page1", "page2", "page3"
    let targetId;

    if (typeof page === "number") {
        targetId = "page" + page;
    } else if (typeof page === "string") {
        if (page.startsWith("page")) {
            targetId = page;          // "page2"
        } else {
            targetId = "page" + page; // "2" -> "page2"
        }
    } else {
        targetId = "page1";
    }

    // hide all pages
    document.querySelectorAll(".page").forEach(p => p.style.display = "none");

    // show selected page
    const target = document.getElementById(targetId);
    if (target) {
        target.style.display = "block";
    }

    // toggle body class for background control
    if (targetId === "page1") {
        document.body.classList.remove("noGlobalBG");
    } else {
        document.body.classList.add("noGlobalBG");
    }
}


window.addEventListener("load", () => {
    goTo(1);
});
window.addEventListener("load", showPage);
window.addEventListener("hashchange", showPage);

/* ------------------------------
   EMOTIONAL LOADING BAR LOGIC
------------------------------ */
window.addEventListener("load", () => {
    const question = document.getElementById("questionText");
    const loadingBar = document.getElementById("loadingBar");

    // Reveal the question after the bar finishes filling
    setTimeout(() => {
        loadingBar.style.animation = "loadingGlow 1.5s infinite"; // stop the fill animation
        question.style.display = "block";

        // Reveal buttons AFTER loading finishes
        document.getElementById("yesBtn").style.display = "inline-block";
        document.getElementById("noBtn").style.display = "inline-block";

    }, 2200); // matches loadingFill duration
});

/* ------------------------------
   SCREAMING NEON "NO" BUTTON
------------------------------ */
const noBtn = document.getElementById("noBtn");

// Add screaming neon styles
noBtn.style.position = "fixed";
noBtn.style.transition = "left 0.1s linear, top 0.1s linear";
noBtn.style.animation = "neonScream 0.2s infinite alternate, jitter 0.1s infinite";

function moveButton() {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 120);

    noBtn.style.left = `${x}px`;
    noBtn.style.top = `${y}px`;
}

noBtn.addEventListener("mouseenter", moveButton);
noBtn.addEventListener("mouseover", moveButton);
